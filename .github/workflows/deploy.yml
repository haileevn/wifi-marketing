name: Deploy portal

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Require deploy secrets
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          if [ -z "$HOST" ]; then
            echo "::warning::Chưa cấu hình GitHub Secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_PORT, DEPLOY_SSH_KEY, DEPLOY_PATH"
            echo "Bỏ qua deploy."
            exit 0
          fi
          echo "DO_DEPLOY=1" >> "$GITHUB_ENV"

      - name: Deploy over SSH
        if: env.DO_DEPLOY == '1'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            APP_DIR="${{ secrets.DEPLOY_PATH }}"
            if [ ! -d "$APP_DIR/.git" ]; then
              sudo mkdir -p "$APP_DIR"
              sudo chown -R "$(whoami)" "$APP_DIR"
              git clone https://github.com/haileevn/wifi-marketing.git "$APP_DIR"
            fi
            cd "$APP_DIR"
            git -c safe.directory="$APP_DIR" fetch origin
            git -c safe.directory="$APP_DIR" checkout main
            git -c safe.directory="$APP_DIR" pull --ff-only origin main
            npm install --omit=dev
            npm run release -- --changelog "CI deploy $(git rev-parse --short HEAD)"
            pm2 restart wifi-portal --update-env || pm2 start src/server.js --name wifi-portal
            pm2 save
            curl -fsS "http://127.0.0.1:${PORT:-20140}/health" || true
            echo "Deployed $(git rev-parse --short HEAD)"
